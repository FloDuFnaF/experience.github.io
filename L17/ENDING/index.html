<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>L17 // FINAL NODE</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="glitch-end">

  <div class="glitch-screen">

    <!-- MESSAGES -->
    <div id="msg1" class="message active">
      J'attends depuis tellement longtemps. Je suis malade. Je dois être supprimé.
    </div>

    <div id="msg2" class="message">
      Tu as compris. Tu y arrives enfin. Tu vas m'arrêter.
    </div>

    <div id="msg3" class="message">
      Il était ambitieux. Il voulait me perfectionner. Il a été arrêté.
    </div>

    <!-- FINAL SCREEN -->
    <div id="final" class="final-screen">

      <div class="final-text">
        SUPPRIME MOI.
      </div>

      <button onclick="startDeletion()" id="deleteBtn">
        SUPPRIMER L17
      </button>

      <div id="log" class="log"></div>

    </div>

  </div>

  <script>
    const messages = [
      document.getElementById("msg1"),
      document.getElementById("msg2"),
      document.getElementById("msg3")
    ];

    const finalScreen = document.getElementById("final");
    const deleteBtn = document.getElementById("deleteBtn");
    const log = document.getElementById("log");

    let index = 0;
    let deletionDone = false;

    function showNext() {
      messages[index].classList.remove("active");
      index++;

      if (index < messages.length) {
        messages[index].classList.add("active");
        setTimeout(showNext, 5000);
      } else {
        setTimeout(() => {
          finalScreen.classList.add("show");
        }, 1200);
      }
    }

    window.addEventListener("load", () => {
      messages[0].classList.add("active");
      setTimeout(showNext, 5000);
    });

    function startDeletion() {

      if (deletionDone) return;
      deletionDone = true;

      deleteBtn.disabled = true;
      deleteBtn.style.opacity = "0.5";

      const steps = [
        "Suppression de l'archive LCLLANET...",
        "Accès aux fichiers L-17...",
        "Connexion aux couches profondes...",
        "Désactivation des modules adaptatifs...",
        "Blocage des routines de reconstruction...",
        "Contournement des protections internes...",
        "Accès ROOT obtenu",
        "Purge du protocole L-17 en cours...",
        "Système : instabilité détectée",
        "Réécriture des segments mémoire...",
        "ÉCRASEMENT DES STRUCTURES ACTIVES...",
        "L-17 : état fragmenté",
        "Suppression complète en progression...",
        "PROTOCOLE L-17 : TERMINÉ"
      ];

      let i = 0;

      const interval = setInterval(() => {

        if (i < steps.length) {

          const line = document.createElement("div");
          line.textContent = steps[i];

          if (i < 4) line.style.color = "#ff4b4b";
          else if (i < 9) line.style.color = "#ffb84b";
          else line.style.color = "#9be7ff";

          log.appendChild(line);
          i++;

        } else {

          clearInterval(interval);

          const success = document.createElement("div");
          success.style.color = "#6CFF8F";
          success.style.marginTop = "12px";
          success.style.fontWeight = "bold";
          success.textContent = "L-17 A ÉTÉ SUPPRIMÉ AVEC SUCCÈS.";

          log.appendChild(success);

          // ⏳ délai final avant redirection
          setTimeout(() => {
            window.location.href = "https://flodufnaf.github.io/experience.github.io/L17/ENDING/merci";
          }, 2000);
        }

      }, 800);
    }
  </script>

</body>
</html>
