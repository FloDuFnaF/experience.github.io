<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>L-17 // ACCÈS</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login">

<div class="login-box">

  <!-- OVERLAY TIMER -->
  <div id="overlay" class="overlay hidden">
    <div class="overlay-content">
      <p>STABILISATION DU SYSTÈME EN COURS</p>
      <h2 id="timer">00:00:00</h2>
    </div>
  </div>

  <!-- TEXTE SYSTEM -->
  <p class="typing top">initialisation du système...</p>

  <div class="login-header">
    <h1>L-17</h1>
    <p>SYSTÈME D’ACCÈS RESTREINT</p>
  </div>

  <div class="login-separator"></div>

  <!-- INPUTS -->
  <input type="text" id="user" placeholder="identifiant">
  <input type="password" id="pass" placeholder="mot de passe">

  <button onclick="login()">AUTHENTIFIER</button>

  <p class="typing bottom">initialisation du protocole...</p>

  <p id="error" class="error"></p>

</div>

<script>
function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if (user === "admin" && pass === "L17-ORIGIN") {

    // petit effet optionnel propre (si tu veux activer overlay plus tard)
    const overlay = document.getElementById("overlay");
    if (overlay) overlay.classList.remove("hidden");

    setTimeout(() => {
      window.location.href = "https://flodufnaf.github.io/experience.github.io/home";
    }, 900);

  } else {
    document.getElementById("error").innerText = "accès refusé";
  }
}
</script>

</body>
</html>
