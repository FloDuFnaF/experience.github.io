<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>L-17 // ACCÈS</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login">

  <div class="login-box">

    <p class="typing top">initialisation du système...</p>

    <div class="login-header">
      <h1>L-17</h1>
      <p>SYSTÈME D’ACCÈS RESTREINT</p>
    </div>

    <div class="login-separator"></div>

    <input type="text" id="user" placeholder="identifiant">
    <input type="password" id="pass" placeholder="mot de passe">

    <button id="loginBtn">AUTHENTIFIER</button>

    <p class="typing bottom">initialisation du protocole...</p>

    <p id="error" class="error"></p>

  </div>

  <script>
    document.getElementById("loginBtn").addEventListener("click", () => {

      const user = document.getElementById("user").value.trim();
      const pass = document.getElementById("pass").value.trim();
      const error = document.getElementById("error");

      if (user === "admin" && pass === "L17-ORIGIN") {

        error.innerText = "";

        window.location.href = "https://flodufnaf.github.io/experience.github.io/home";

      } else {
        error.innerText = "accès refusé";
      }
    });
  </script>

</body>
</html>
