<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>L-17 // ACCÈS</title>
<link rel="stylesheet" href="style.css">
</head>

<p class="typing">initialisation du système...</p>

<body class="login">

<div class="login-box">

  <div class="login-header">
    <h1>L-17</h1>
    <p>SYSTÈME D’ACCÈS RESTREINT</p>
  </div>

  <div class="login-separator"></div>

  <input type="text" id="user" placeholder="identifiant">
  <input type="password" id="pass" placeholder="mot de passe">

  <button onclick="login()">AUTHENTIFIER</button>

  <p class="typing">initialisation du protocole...</p>

  <p id="error" class="error"></p>

</div>

<script>
function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if (user === "admin" && pass === "L17-ORIGIN") {
    window.location.href = "home.html";
  } else {
    document.getElementById("error").innerText = "accès refusé";
  }
}
</script>

</body>
</html>
